# LLM 优化工具配置文件
[general]
Version = "0.0.1"  # 版本号

[llmSettings]
platform = HuggingFace  # LLM 平台 (如 HuggingFace)
model = qwen3.5-plus    # 使用的模型名称

[promptSettings]
mapPath = "inputs/downtown/peak_travel_time.csv"  # 地图交通数据路径 (CSV)
modelPath = "config/firstLevelExample.py"        # Level-1 基础 Prompt/模型定义文件路径

[hsSettings]
popSize = 10     # 和声搜索 (HS) 算法的种群大小 (Harmony Memory Size)
iteration = 5   # 算法最大迭代次数
HMCR = 0.9      # 和声库保留概率 (Harmony Memory Considering Rate)
PAR = 0.5       # 音调微调概率 (Pitch Adjusting Rate)

[simSettings]
simulationTime = 600   # 仿真运行总时间 (秒)
totalVehicleNum = 80   # 场景中的总车辆数 (作为任务发起源)
totalPassNum = 65      # 场景中的总乘客数 (相关业务指标)
city = "NYC"           # 城市地图场景标识 (如纽约)

# ==============================================================
# Edge UAV parameters (边缘无人机相关参数)
# ==============================================================

[edgeUavEnv]
delta = 0.5                      # 时隙持续时间长度 (秒)
T = 80                           # 仿真的总时隙数
x_max = 500.0                    # 场景横向边界范围 (米)
y_max = 500.0                    # 场景纵向边界范围 (米)
H = 100.0                        # 无人机飞行高度 (米)
N_0 = 1e-10                      # 高斯噪声功率谱密度 (W/Hz)
d_U_safe = 10.0                  # 无人机之间的最小安全间隔距离 (米)

[edgeUavComm]
B_up = 1e7                       # 上行链路带宽 (Hz) — 降低使位置对通信时延影响更显著
B_down = 1e7                     # 下行链路带宽 (Hz) — 同上
P_i = 0.5                        # 任务设备端 (Ground Equipment) 发射功率 (W)
P_j = 1.0                        # 无人机端发射功率 (W)
rho_0 = 1e-5                     # 参考距离 (d_0=1m) 下的信道增益 (Channel gain)

[edgeUavEnergy]
gamma_i = 1e-28                  # 本地设备计算能耗系数
gamma_j = 1e-28                  # 无人机端 (Edge) 计算能耗系数 (Capacitance coefficient)

[edgeUavProp]
v_U_max = 50.0                   # 无人机最大允许飞行速度 (m/s)
v_tip = 120.0                    # 无人机旋翼叶尖速度 (m/s)
eta_1 = 79.86                    # 桨叶型阻功率系数 (Blade Profile Power coefficient)
eta_2 = 88.63                    # 诱导功率系数 (Induced Power coefficient)
eta_3 = 0.0151                   # 诱导功率修正项 (Induction correction)
eta_4 = 0.0048                   # 寄生阻力功率系数 (Parasite Drag Power coefficient)

[edgeUavScenario]
numTasks = 20                    # 场景中生成的总任务数
numUAVs = 3                      # 场景中的无人机数量

[edgeUavHardware]
E_max = 5000.0                # 每架无人机的最大电池能量容量 (焦耳)
f_max = 2e10                     # 无人机最大 CPU 频率限制 (Hz)
N_max = 2                        # 无人机单时隙最大可处理的任务并发数

[edgeUavWeights]
alpha = 350.0                  # 目标函数：总时延权重因子
gamma_w = 0.01                   # 目标函数：计算能耗权重因子
lambda_w = 1.0                   # 目标函数：轨迹优化中的推进能耗权重系数 现在gamma和lambda 共享了 g为准

[edgeUavTask]
D_l_min = 1e5                    # 任务输入数据量最小值 (bits)
D_l_max = 3e5                    # 任务输入数据量最大值 (bits)
D_r_min = 2e4                    # 任务输出结果量最小值 (bits)
D_r_max = 8e4                    # 任务输出结果量最大值 (bits)
F_min = 5e7                      # 任务所需 CPU 计算周期数最小值 (cycles)
F_max = 2e8                      # 任务所需 CPU 计算周期数最大值 (cycles) — 超出 tau×f_local，~33% 任务需卸载
tau_min = 1.0                    # 任务截止期最小值 (秒) — 扩大卸载可行性窗口
tau_max = 1.0                    # 任务截止期最大值 (秒) — 同上
f_local_default = 3e8            # 默认本地计算频率 (Hz)
active_mode = contiguous_window  # 任务活跃模式 (连续时间窗)
active_window_min = 24           # 活跃时间窗口的最小起始时隙
active_window_max = 64           # 活跃时间窗口的最大终止时隙

[edgeUavDepot]
depot_x = 500.0                  # UAV 仓库/起降点起始横坐标 (米)
depot_y = 500.0                  # UAV 仓库/起降点起始纵坐标 (米)

[edgeUavSeed]
scenario_seed = 42               # 场景生成的随机种子 (用于实验可重复性)

[edgeUavBCDIntegration]
use_bcd_loop = true             # 是否启用坐标下降 (BCD) 循环优化
llm_layer = L2b                 # LLM 作用层：L1（任务分配目标）或 L2b（轨迹优化目标）
bcd_max_iter = 5                # BCD 最大外层循环迭代次数
bcd_eps = 0.001                 # BCD 收敛判断精度阈值
bcd_rollback_delta = 0.05       # 回滚检查的步长因子
bcd_max_rollbacks = 2           # 求解失败时的最大回滚尝试次数

[edgeUavBCD]
safe_slack_penalty = 1000000    # 安全距离松弛变量的惩罚权重
v_traj_max = 50.0               # 轨迹优化阶段的最大允许速度 (m/s)
d_safe_traj = 0.0              # 轨迹优化阶段的安全距离约束 (米) — 禁用
max_sca_iter = 10                # SCA (连续凸近似) 最大迭代次数
eps_sca = 0.001                 # SCA 收敛判断精度阈值
