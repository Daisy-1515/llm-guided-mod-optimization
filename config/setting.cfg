# LLM OPTIMIZATION Tool config file
[general]
Version = "0.0.1"

[llmSettings]
platform = HuggingFace
model = glm-5

[promptSettings]
mapPath = "inputs/downtown/peak_travel_time.csv"
modelPath = "config/firstLevelExample.py"

[hsSettings]
popSize = 5
iteration = 10

[simSettings]
simulationTime = 600 
totalVehicleNum = 80
totalPassNum = 65
city = "NYC"

# ==============================================================
# Edge UAV 计算卸载参数（以下各节仅在 Edge UAV 场景下生效）
# ==============================================================

[edgeUavEnv]
delta = 1.0          # 时隙长度 (s)
T = 20               # 总时隙数
x_max = 1000.0       # 空域 x 边界 (m)
y_max = 1000.0       # 空域 y 边界 (m)
H = 100.0            # UAV 固定飞行高度 (m)
N_0 = 1e-10          # 噪声功率 (W)，约 -100 dBm
d_U_safe = 50.0      # UAV 间安全距离 (m)

[edgeUavComm]
B_up = 1e6           # 上行带宽 (Hz)
B_down = 1e6         # 下行带宽 (Hz)
P_i = 0.5            # TD 上行发射功率 (W)，常数
P_j = 1.0            # UAV 下行发射功率 (W)
rho_0 = 1e-5         # 1m 参考信道增益 (-50 dB)，自由空间路损 g = rho_0 / d^2

[edgeUavEnergy]
gamma_i = 1e-28      # TD 芯片有效电容能耗系数
gamma_j = 1e-28      # 边缘节点芯片有效电容能耗系数

[edgeUavProp]
v_U_max = 30.0       # UAV 最大飞行速度 (m/s)
v_tip = 120.0        # 旋翼桨尖速度 (m/s)
eta_1 = 79.86        # 叶片剖面功率参数 (W)
eta_2 = 88.63        # 诱导功率参数 (W)
eta_3 = 0.0151       # 机身阻力比系数
eta_4 = 0.0048       # 空气密度相关系数

[edgeUavScenario]
numTasks = 10        # 终端设备（任务源）数量
numUAVs = 3          # UAV 数量

[edgeUavHardware]
E_max = 5000.0       # UAV 默认能量预算 (J)
f_max = 5e9          # UAV 默认最大 CPU 频率 (Hz)

[edgeUavWeights]
alpha = 1.0          # 归一化时延权重
gamma_w = 1.0        # 归一化计算能耗权重
lambda_w = 1.0       # 归一化飞行能耗权重

[edgeUavTask]
D_l_min = 5e6                # 上行数据量下界 (bits)
D_l_max = 5e7                # 上行数据量上界 (bits)
D_r_min = 1e5                # 下行数据量下界 (bits)
D_r_max = 1e6                # 下行数据量上界 (bits)
F_min = 1e8                  # CPU 周期数下界 (cycles)
F_max = 5e9                  # CPU 周期数上界 (cycles)
tau_min = 0.5                # 截止时间下界 (s)
tau_max = 2.0                # 截止时间上界 (s)
f_local_default = 1e9        # 终端默认本地 CPU 频率 (Hz)
active_mode = contiguous_window  # 活跃模式（contiguous_window = 连续窗口）
active_window_min = 5        # 活跃窗口最小长度（时隙数）
active_window_max = 15       # 活跃窗口最大长度（时隙数）

[edgeUavDepot]
depot_x = 500.0              # 基站 x 坐标 (m)
depot_y = 500.0              # 基站 y 坐标 (m)

[edgeUavSeed]
scenario_seed = 42           # 场景随机种子
