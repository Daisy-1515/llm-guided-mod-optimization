# LLM OPTIMIZATION Tool config file
[general]
Version = "0.0.1"

[llmSettings]
platform = HuggingFace
model = qwen3.5-plus

[promptSettings]
mapPath = "inputs/downtown/peak_travel_time.csv"
modelPath = "config/firstLevelExample.py"

[hsSettings]
popSize = 3
iteration = 3
HMCR = 0.9
PAR = 0.5

[simSettings]
simulationTime = 600
totalVehicleNum = 80
totalPassNum = 65
city = "NYC"

# ==============================================================
# Edge UAV parameters - V2 main
# Single-slot completion while keeping MEC competition
# ==============================================================

[edgeUavEnv]
delta = 0.5
T = 80
x_max = 500.0
y_max = 500.0
H = 100.0
N_0 = 1e-10
d_U_safe = 10.0

[edgeUavComm]
B_up = 4e7
B_down = 4e7
P_i = 0.5
P_j = 1.0
rho_0 = 1e-5

[edgeUavEnergy]
gamma_i = 1e-28
gamma_j = 1e-28

[edgeUavProp]
v_U_max = 50.0
v_tip = 120.0
eta_1 = 79.86
eta_2 = 88.63
eta_3 = 0.0151
eta_4 = 0.0048

[edgeUavScenario]
numTasks = 20
numUAVs = 3

[edgeUavHardware]
E_max = 5000.0
f_max = 2e10
N_max = 2

[edgeUavWeights]
alpha = 1.0
gamma_w = 1.0
lambda_w = 1.0

[edgeUavTask]
D_l_min = 1e5
D_l_max = 3e5
D_r_min = 2e4
D_r_max = 8e4
F_min = 5e7
F_max = 2.5e8
tau_min = 0.5
tau_max = 0.5
f_local_default = 1e9
active_mode = contiguous_window
active_window_min = 24
active_window_max = 64

[edgeUavDepot]
depot_x = 500.0
depot_y = 500.0

[edgeUavSeed]
scenario_seed = 42

[edgeUavBCDIntegration]
use_bcd_loop = true
bcd_max_iter = 5
bcd_eps = 0.001
bcd_rollback_delta = 0.05
bcd_max_rollbacks = 2

[edgeUavBCD]
safe_slack_penalty = 1000
v_traj_max = 50.0
d_safe_traj = 10.0
max_sca_iter = 5
eps_sca = 0.001
